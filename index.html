<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trymax-Tech | Systems & Design</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { padding: 40px; width: 95%; max-width: 800px; }
        
        /* Logo Styling */
        .logo { width: 100%; max-width: 600px; height: auto; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5)); }
        
        .description { font-size: 1.2em; line-height: 1.6; color: #b0b0b0; max-width: 600px; margin: 0 auto; border-top: 1px solid #333; padding-top: 20px; }
        .status { color: #d32f2f; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-top: 30px; font-size: 0.9em; opacity: 0.8; }
        
        /* Subtle animation for the status */
        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <img src="Trymax Tech Logo no outline.svg" alt="Trymax Tech Logo" class="logo">

        <p class="description">
            Multidisciplinary Custom Design<br>
            <strong>3D Printing • Networking • Servers • OT Systems</strong>
        </p>
        
        <p class="status blink">_ System Initializing _</p>
    </div>
</body>
</html>
