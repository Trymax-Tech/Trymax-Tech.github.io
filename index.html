<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trymax-Tech | Systems & Design</title>
    <style>
        /* Engineering Grid Background */
        body { 
            background-color: #0f0f0f; 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }

        .container { 
            border: 1px solid #333; 
            padding: 40px; 
            border-radius: 12px; 
            background: rgba(30, 30, 30, 0.95); 
            backdrop-filter: blur(5px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); 
            width: 90%; 
            max-width: 600px; 
        }
        
        .logo-wrapper { margin-bottom: 15px; display: inline-block; }
        .main-logo { max-width: 450px; height: auto; display: block; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        
        hr { border: 0; border-top: 1px solid #444; margin: 25px 0; }
        p { font-size: 1.1em; line-height: 1.6; color: #b0b0b0; margin: 5px 0; }
        strong { color: #ffffff; letter-spacing: 0.5px; }
        
        .status { 
            color: #ff4d29; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 35px; 
            font-size: 0.85em; 
            animation: blink 2s infinite; 
        }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="Trymax%20Tech%20Logo.png" alt="Trymax Tech Logo" class="main-logo">
        </div>
        
        <hr>
        <p>Custom Designs for:</p>
        <p><strong>3D Printing • Networking • Servers • OT Systems</strong></p>
        
        <p class="status">_ System Initializing _</p>
    </div>
</body>
</html>
